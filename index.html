<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receiver-Driven Sparse V2V Communication</title>
    <style>
      html,body,#root{width:100%;height:100%;margin:0;background:#071012}
      #boot{position:fixed;inset:0;display:grid;place-items:center;color:#91a7a7;font:12px ui-monospace,monospace;letter-spacing:.08em}
      #boot.error{z-index:999;padding:12vw;color:#ffb7a8;white-space:pre-wrap;line-height:1.7;letter-spacing:0}
    </style>
    <script>
      window.addEventListener('error', function (event) {
        var boot = document.getElementById('boot');
        if (!boot) return;
        boot.className = 'error';
        boot.textContent = 'Presentation failed to start\n\n' + (event.message || 'Unknown script error') + '\n' + (event.filename || '') + (event.lineno ? ':' + event.lineno : '');
      });
      window.addEventListener('unhandledrejection', function (event) {
        var boot = document.getElementById('boot');
        if (!boot) return;
        boot.className = 'error';
        boot.textContent = 'Presentation failed to start\n\n' + String(event.reason && (event.reason.stack || event.reason.message) || event.reason);
      });
    </script>
  </head>
  <body>
    <div id="root"><div id="boot">INITIALIZING 3D PRESENTATION…</div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
